name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-installer:
    name: Build ${{ matrix.arch }} installer
    runs-on: windows-2025

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            preset: windows-x64-release
          - arch: x86
            preset: windows-x86-release
          - arch: arm64
            preset: windows-arm64-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --target binify

      - name: Package installer
        shell: powershell
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          & $iscc ".\installer\binify.iss" /DAppArch=${{ matrix.arch }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: binify-windows-${{ matrix.arch }}
          path: out/installer/*.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build-installer
    runs-on: ubuntu-latest

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.exe \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
